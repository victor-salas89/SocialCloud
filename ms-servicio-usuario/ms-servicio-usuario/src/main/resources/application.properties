spring.application.name=ms-servicio-usuario
server.port=8180

# Conexion MySQL Laragon
spring.datasource.url=jdbc:mysql://localhost:3306/socialcloud_usuario_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
jwt.secret=SocialCloudSecretKeySocialCloudSecretKey2025
jwt.expiration=86400000

# Logs
logging.level.org.springframework.security=DEBUG
